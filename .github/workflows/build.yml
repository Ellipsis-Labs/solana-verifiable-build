name: Build Release Artifacts

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref (branch, tag, or SHA) to build"
        required: true
        default: master
        type: string

concurrency:
  group: build-release-artifacts-${{ github.repository }}-${{ github.event.inputs.ref }}
  cancel-in-progress: false

jobs:
  build_release:
    name: Build Artifacts (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux
            os: ubuntu-latest
          - name: macos
            os: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.ref }}

      - name: Install dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -o Acquire::Retries=3
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            pkg-config libudev-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.0

      - name: Build release binary
        run: cargo build --release --locked

      - name: Package artifacts
        env:
          TARGET_OS: ${{ matrix.name }}
        run: |
          set -euo pipefail
          BIN="solana-verify-${TARGET_OS}"
          cp target/release/solana-verify "$BIN"
          shasum -a 256 "$BIN" > "${BIN}.sha256"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.name }}
          path: |
            solana-verify-${{ matrix.name }}
            solana-verify-${{ matrix.name }}.sha256
          if-no-files-found: error
